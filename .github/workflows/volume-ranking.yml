name: Bybit Volume Ranking Signal

on:
  schedule:
    - cron: "5 0 * * *"   # каждый день в 00:05 UTC
  workflow_dispatch:        # ручной запуск из интерфейса GitHub

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore signals state (diff between runs)
        uses: actions/cache@v4
        with:
          path: signals_state.json
          key: signals-state-${{ github.run_id }}
          restore-keys: |
            signals-state-

      - name: Run strategy
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          RUN_MODE: once
        run: python main.py
